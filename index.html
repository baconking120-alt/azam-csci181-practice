<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Home - Adam Azam portfolio</title>
  </head>

  <body>
    <header id="page-header">
      <img
        src="images/logo.png"
        alt="Personal logo"
        width="48px"
        height="48px"
      />
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="resume.html">Resume</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="hero">
        <h1 class="hero-tagline">CSCI 181 Practice Website</h1>
        <p class="hero-text">Resume & portfolio practice site</p>
        <a href="resume.html" class="hero-button">View My Work</a>
      </section>
      <h1>Home</h1>
      <section id="contact" class="page-section">
        <h2>Contact me</h2>
        <p>
          Please feel free to reach out and contact me and ill get to you within
          the next few business days
        </p>
        <form action="#" method="post" class="contact-form">
          <!-- Name -->
          <div class="form-group">
            <label for="name">Your Name</label>
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="Enter your name"
            />
          </div>
          <!--email-->
          <div class="form-group">
            <label for="email">Your Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="Enter your email"
            />
          </div>
          <!--message-->
          <div class="form-group">
            <label for="message">Your message to Adam</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
              placeholder="Type your message here"
            ></textarea>
          </div>
          <!--send it-->
          <button type="submit" class="hero-button">send message</button>
        </form>
      </section>
    </main>
  </body>
</html>
