<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cathedral Bento Grid</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <main>
      <section class="bento-grid-container">
        <div class="bento-grid">
          <div class="bento-tile large">
            <img src="images/cathedral1.jpg" alt="Cathedral 1" />
          </div>
          <div class="bento-tile">
            <img src="images/cathedral2.jpg" alt="Cathedral 2" />
          </div>
          <div class="bento-tile bento-center">Cathedral Architecture</div>
          <div class="bento-tile tall">
            <img src="images/cathedral3.jpg" alt="Cathedral 3" />
          </div>
          <div class="bento-tile">
            <img src="images/cathedral4.jpg" alt="Cathedral 4" />
          </div>
          <div class="bento-tile tall">
            <img src="images/cathedral5.jpg" alt="Cathedral 5" />
          </div>
          <div class="bento-tile">
            <img src="images/cathedral6.jpg" alt="Cathedral 6" />
          </div>
          <div class="bento-tile large">
            <img src="images/cathedral7.jpg" alt="Cathedral 7" />
          </div>
          <div class="bento-tile">
            <img src="images/cathedral8.jpg" alt="Cathedral 8" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
